name: valortrash
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'



dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  provider: ^6.1.1
  url_launcher: ^6.2.2
  cupertino_icons: ^1.0.2

dependency_overrides:
  firebase_auth_web: ^5.9.0
  firebase_core_web: ^2.11.0
  firebase_storage_web: ^3.7.0
  cloud_firestore_web: ^3.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  
  assets:
    - assets/images/logo.jpg
    - assets/images/plastique.jpg
    - assets/images/carton.jpg
    - assets/images/metal.jpg
    - assets/images/verre.jpg
    - assets/images/bois.jpg
    - assets/images/im.jpg
    
    - assets/images/importance.jpg
    - assets/images/guide.jpg
flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/icon/logo.png" 
  min_sdk_android: 21
  